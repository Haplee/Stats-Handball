<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handball AI Analytics</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Handball AI Analytics Platform</h1>
    </header>
    <main>
        <section id="upload-section">
            <h2>Subir Vídeo</h2>
            <form id="upload-form" enctype="multipart/form-data">
                <input type="file" id="video-file" name="video" accept="video/*" required>
                <button type="submit">Analizar Vídeo</button>
            </form>
        </section>
        <section id="processing-status">
            <h2>Estado</h2>
            <div id="status-container">Esperando vídeo...</div>
        </section>
        <section id="results-section">
            <h2>Resultados</h2>
            <div id="results-container"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
